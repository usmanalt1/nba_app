services:
  mysql-host:
    image: mysql
    environment:
        MYSQL_ROOT_PASSWORD: admin
        MYSQL_DATABASE: nba_test
        MYSQL_USER: admin
        MYSQL_PASSWORD: admin
        MYSQL_TCP_PORT: 3307
    ports:
      - "3307:3307"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  nba_app_backend:
    build: .
    env_file:
      - .env
    depends_on:
      mysql-host:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - type: bind
        source: .
        target: /nba_app
    
    container_name: nba_app_backend

  dagster-webserver:
    build: .
    command: dagster-webserver -h 0.0.0.0 -p 3000 -f /nba_app/dagster/definitions.py -d /nba_app/dagster
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /nba_app/dagster_home
    ports:
      - "3000:3000"
    volumes:
      - type: bind
        source: .
        target: /nba_app
    container_name: dagster_webserver

  dagster-daemon:
    build: .
    command: dagster-daemon run -f /nba_app/dagster/definitions.py -d /nba_app/dagster
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /nba_app/dagster_home
    volumes:
      - type: bind
        source: .
        target: /nba_app
    container_name: dagster_daemon

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
      - "9094:9094"
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

volumes:
  kafka-data:
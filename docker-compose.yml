services:
  mysql-host:
    image: mysql
    environment:
        MYSQL_ROOT_PASSWORD: admin
        MYSQL_DATABASE: nba_test
        MYSQL_USER: admin
        MYSQL_PASSWORD: admin
        MYSQL_TCP_PORT: 3307
    ports:
      - "3307:3307"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  nba_app_backend:
    build: .
    env_file:
      - .env
    depends_on:
      mysql-host:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - type: bind
        source: .
        target: /nba_app
    
    container_name: nba_app_backend

  dagster-webserver:
    build: .
    command: dagster-webserver -h 0.0.0.0 -p 3000 -f /nba_app/dagster/definitions.py -d /nba_app/dagster
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /nba_app/dagster_home
    ports:
      - "3000:3000"
    volumes:
      - type: bind
        source: .
        target: /nba_app
    container_name: dagster_webserver

  dagster-daemon:
    build: .
    command: dagster-daemon run -f /nba_app/dagster/definitions.py -d /nba_app/dagster
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /nba_app/dagster_home
    volumes:
      - type: bind
        source: .
        target: /nba_app
    container_name: dagster_daemon

services:
  mysql-host:
    image: mysql
    environment:
        MYSQL_ROOT_PASSWORD: admin
        MYSQL_DATABASE: nba_test
        MYSQL_USER: admin
        MYSQL_PASSWORD: admin
        MYSQL_TCP_PORT: 3307
    ports:
      - "3307:3307"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  nba_app_backend:
    build: .
    env_file:
      - .env
    depends_on:
      mysql-host:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - type: bind
        source: .
        target: /nba_app
    
    container_name: nba_app_backend
